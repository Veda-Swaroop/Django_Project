{% extends "store/base.html" %}

{% block title %}Products{% endblock title %}
{% block body %}

    <h1>This is the Products Page</h1>

    <div>
        {% for item in data %}
            <h3>{{ item.item_name }}</h3>
            <h5>{{ item.price }}</h5>
            <h4>{{ item.category }}</h4>
            <p>{{ item.description }}</p>

        {% endfor %}
    </div>

{% endblock body %}
